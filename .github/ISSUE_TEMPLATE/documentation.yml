name: Documentation
description: Report missing, unclear, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Where is the documentation?
      description: URL, file path, or README section.
      placeholder: "README.md, Getting started section"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or content
    validations:
      required: false

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this.
          required: false
